# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.26.4"
  python_check_max: "3.14"
  pytest_k: |-
    not (
      (multiple_values and main)
      or completion
      or invalid_score
      or path_convert_failures
      or (types_file and file_error)
    )

recipe:
  name: typer-split
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/typer/typer-${{ version }}.tar.gz
    sha256: 25b128964de66c5ea36d5ac82adc579e5e113509b17469edf9f5a4a1864ff2a9

build:
  number: 0
  noarch: python

outputs:
  - package:
      name: typer
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - pdm-backend
        - pip
        - python ${{ python_min }}.*
      run:
        - annotated-doc >=0.0.2
        - colorama
        - python >=${{ python_min }}
        - rich >=13.8.0
        - shellingham >=1.3.0
    tests:
      - python:
          imports: typer
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
      - files:
          source:
            - tests/
            - docs_src/
        requirements:
          run:
            - coverage >=7.13
            - pytest >=9
            - python ${{ python_min }}.*
        script:
          - typer --version
          - typer --help
          - coverage run --source=typer --branch -m pytest -vv --color=yes --tb=long -k "${{ pytest_k | split | join(' ') }}"
          - coverage report --show-missing --skip-covered --fail-under=66

about:
  license: MIT AND BSD-3-Clause
  license_file:
    - LICENSE
    - typer/_click/LICENSE.txt
  summary: Typer, build great CLIs. Easy to code. Based on Python type hints.
  homepage: https://pypi.org/project/typer
  documentation: https://typer.tiangolo.com
  repository: https://github.com/fastapi/typer

extra:
  feedstock-name: typer
  recipe-maintainers:
    - thewchan
    - dfornika
    - bollwyvl
    - fcollonval
