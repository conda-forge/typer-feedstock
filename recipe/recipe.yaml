# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.24.1"

recipe:
  name: typer-split
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/typer/typer-${{ version }}.tar.gz
    sha256: e39b4732d65fbdcde189ae76cf7cd48aeae72919dea1fdfc16593be016256b45

build:
  number: 0
  noarch: python

outputs:
  - package:
      name: typer
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - pdm-backend
        - pip
        - python ${{ python_min }}.*
      run:
        - annotated-doc >=0.0.2
        - click >=8.2.1
        - python >=${{ python_min }}
        - rich >=12.3.0
        - shellingham >=1.3.0
    tests:
      - python:
          imports: typer
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"
      - files:
          source:
            - tests/
            - docs_src/
        requirements:
          run:
            - coverage
            - pytest
            - python ${{ python_min }}.*
        script:
          - typer --version
          - typer --help
          - pytest -vvv typer
          # - coverage run --source=typer --branch -m pytest -vv --color=yes --tb=long -k "not ((multiple_values and main) or completion or invalid_score)"
          # - coverage report --show-missing --skip-covered --fail-under=66

about:
  license: MIT
  license_file: LICENSE
  summary: Typer, build great CLIs. Easy to code. Based on Python type hints.
  homepage: https://pypi.org/project/typer
  documentation: https://typer.tiangolo.com
  repository: https://github.com/tiangolo/typer

extra:
  feedstock-name: typer
  recipe-maintainers:
    - thewchan
    - dfornika
    - bollwyvl
    - fcollonval
